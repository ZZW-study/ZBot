name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # H39 修复:取消注释,跑后端测试 + 覆盖率门禁。
      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest ZBot/test/ -v --tb=short \
            --cov=ZBot --cov-report=term-missing --cov-fail-under=60 \
            --ignore=ZBot/test/evals \
            --timeout=60

      - name: Run ruff lint
        run: uv run ruff check ZBot/

  # H39 修复:取消注释,跑前端 lint + build。
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZBot/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build
