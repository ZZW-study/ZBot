services:
  zbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zbot
    stdin_open: true
    tty: true
    volumes:
      - ${USERPROFILE}/.ZBot:/root/.ZBot
      - .:/app
    working_dir: /app
    command: ["uv", "run", "python", "-m", "ZBot", "--help"]
    restart: "no"